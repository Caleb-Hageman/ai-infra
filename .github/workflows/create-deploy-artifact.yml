name: Deploy API
on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/cloudrun-deploy.yml
    with:
      service_name: api-service
      image_repo: api-registry/api
      dockerfile: Dockerfile.prod
      env_vars: |
        DATABASE_URL=postgresql+asyncpg://rag_user:${{ secrets.PG_PASSWORD }}@${{ secrets.DB_HOST }}:5432/rag_db
    secrets: inherit

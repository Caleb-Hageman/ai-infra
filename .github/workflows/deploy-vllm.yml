name: Deploy vLLM
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/cloudrun-deploy.yml
    with:
      service_name: llama3-vllm
      image_repo: api-registry/vllm
      dockerfile: Dockerfile.vllm
      deploy_region: us-east4
      deploy_flags: >
        --memory=32Gi
        --cpu=8
        --gpu=1
        --gpu-type=nvidia-l4
        --execution-environment=gen2
        --no-cpu-throttling
        --no-gpu-zonal-redundancy
        --timeout=3600
        --concurrency=8
        --min-instances=0
        --max-instances=1
    secrets: inherit

name: Deploy Postgres to GCP e2-micro VM
run-name: Deploying PG commit ${{ github.sha }} by @${{ github.actor }}

on:
  push:
    paths:
      - 'pgvector/**'
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  REGION: us-east1
  ZONE: us-east1-c
  VM_NAME: pg-instance-free-20260331-141817
  IMAGE_NAME: us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/api-registry/pgvector-db

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Auth
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.REGION }}-docker.pkg.dev'

      - name: Build and push pgvector
        uses: docker/build-push-action@v5
        with:
          context: ./pgvector
          file: ./pgvector/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: SSH and Update VM via IAP
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} --zone ${{ env.ZONE }} --tunnel-through-iap --command "true" || true
          
          sleep 30

          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone ${{ env.ZONE }} \
            --tunnel-through-iap \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command "
              gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
              docker pull ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
              docker stop pg-vector-db || true
              docker rm pg-vector-db || true
              docker run -d \
                --name pg-vector-db \
                --restart always \
                -e POSTGRES_DB=rag_db \
                -e POSTGRES_USER=rag_user \
                -e POSTGRES_PASSWORD=${{ secrets.PG_PASSWORD }} \
                -p 5432:5432 \
                -v pg_data:/var/lib/postgresql/data \
                ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
              
                docker image prune -af
            "

name: Test

on:
  push:
    branches: [main, "fix/*"]
  pull_request:
    branches: [main, "fix/*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        env:
          ADMIN_TEAM_ID: 'sk-dummy'
        run: uv run pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=80

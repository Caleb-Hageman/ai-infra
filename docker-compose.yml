services:
  db:
    build: ./pgvector
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ADMIN_TEAM_ID=${ADMIN_TEAM_ID}
      - ADMIN_API_KEY_ID=${ADMIN_API_KEY_ID}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ${GCP_KEY_FILE:-./indigo-bedrock-487015-g2-bfe590860b1d.json}:/app/gcp-key.json:ro
      - ./app:/app/app
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-https://llama3-vllm-703116401106.us-east4.run.app}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=5432
      - POSTGRES_HOST=db
      - ADMIN_TEAM_ID=${ADMIN_TEAM_ID}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: